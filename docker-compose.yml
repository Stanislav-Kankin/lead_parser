version: "3.9"

services:
  lead_parser:
    build: .
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/leads.db
    volumes:
      - ./data:/app/data
      - ./lead_signal_session.session:/app/lead_signal_session.session
      - ./exports:/app/exports
    restart: unless-stopped
  lead_dashboard:
    build: .
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/leads.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
    ports:
      - "8011:8000"
    restart: unless-stopped
