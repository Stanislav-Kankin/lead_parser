services:
  web:
    build: .
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/leads.db
    volumes:
      - ./data:/app/data
      - ./lead_signal_session.session:/app/lead_signal_session.session
      - ./exports:/app/exports
    ports:
      - "8011:8000"
    restart: unless-stopped
