version: "3.9"

services:
  lead_parser:
    build: .
    env_file:
      - .env
    volumes:
      - ./leads.db:/app/leads.db
      - ./lead_signal_session.session:/app/lead_signal_session.session
      - ./exports:/app/exports
    restart: unless-stopped
  lead_dashboard:
    build: .
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./leads.db:/app/leads.db
      - ./exports:/app/exports
    ports:
      - "127.0.0.1:8011:8000"
    restart: unless-stopped
